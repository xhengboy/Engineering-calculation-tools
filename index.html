<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程反算計算器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #f0f2f5; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { font-size: 1rem; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        input { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #34495e; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        .res { font-size: 0.85rem; color: #d35400; font-weight: bold; padding: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">

    <h2>1. 圓形掃描 (Max=100萬us)</h2>
    <input type="number" id="p1_rate" placeholder="Line Rate">
    <input type="number" id="p1_period" placeholder="Line Period">
    <input type="number" id="p1_round" placeholder="真圓度">
    <input type="number" id="p1_res" placeholder="影像精度">
    <input type="number" id="p1_speed" placeholder="速度">
    <button onclick="c1()">計算</button>
    <div id="r1" class="res"></div>

    <h2>2. Sensor Size (um換算)</h2>
    <input type="number" id="p2_sensor" placeholder="Sensor Size (mm)">
    <input type="number" id="p2_res" placeholder="解析度">
    <input type="number" id="p2_pix" placeholder="Pixel Size (um)">
    <button onclick="c2()">計算</button>
    <div id="r2" class="res"></div>

    <h2>3. 影像精度</h2>
    <input type="number" id="p3_prec" placeholder="影像精度">
    <input type="number" id="p3_fov" placeholder="FOV (mm)">
    <input type="number" id="p3_res" placeholder="解析度">
    <button onclick="c3()">計算</button>
    <div id="r3" class="res"></div>

    <h2>4. CCTV FOV</h2>
    <input type="number" id="p4_fov" placeholder="FOV (mm)">
    <input type="number" id="p4_wd" placeholder="WD (mm)">
    <input type="number" id="p4_sensor" placeholder="Sensor Size (mm)">
    <input type="number" id="p4_f" placeholder="焦距 f (mm)">
    <button onclick="c4()">計算</button>
    <div id="r4" class="res"></div>

    <h2>5. Telecentric</h2>
    <input type="number" id="p5_mag" placeholder="倍率">
    <input type="number" id="p5_fov" placeholder="FOV (mm)">
    <input type="number" id="p5_prec" placeholder="精度 (um)">
    <input type="number" id="p5_sensor" placeholder="Sensor Size (mm)">
    <input type="number" id="p5_pix" placeholder="Pixel Size (um)">
    <input type="number" id="p5_res" placeholder="解析度">
    <button onclick="c5()">計算</button>
    <div id="r5" class="res"></div>
</div>

<script>
    const MAX = 1000000;
    const f = (val) => val.toFixed(3);

    function c1() {
        let rate = parseFloat(document.getElementById('p1_rate').value);
        let period = parseFloat(document.getElementById('p1_period').value);
        let round = parseFloat(document.getElementById('p1_round').value);
        let res = parseFloat(document.getElementById('p1_res').value);
        let speed = parseFloat(document.getElementById('p1_speed').value);
        
        // 推導：Period = MAX/Rate, Corrected_Period = Period*Round, Corrected_Rate = MAX/Corrected_Period, Speed = Corrected_Rate * Res
        if(!period && rate) period = MAX/rate;
        if(!rate && period) rate = MAX/period;
        if(!speed && rate && round && res) speed = (MAX / (MAX/rate * round)) * res;
        document.getElementById('r1').innerText = `Line Rate: ${f(rate)} | Period: ${f(period)} | 速度: ${f(speed)}`;
    }

    function c2() {
        let s = parseFloat(document.getElementById('p2_sensor').value);
        let r = parseFloat(document.getElementById('p2_res').value);
        let p = parseFloat(document.getElementById('p2_pix').value);
        if(!s) s = (r * p) / 1000;
        if(!r) r = (s * 1000) / p;
        if(!p) p = (s * 1000) / r;
        document.getElementById('r2').innerText = `Sensor: ${f(s)}mm | Res: ${f(r)} | PixSize: ${f(p)}um`;
    }

    function c3() {
        let pr = parseFloat(document.getElementById('p3_prec').value);
        let fv = parseFloat(document.getElementById('p3_fov').value);
        let rs = parseFloat(document.getElementById('p3_res').value);
        if(!pr) pr = fv / rs;
        if(!fv) fv = pr * rs;
        if(!rs) rs = fv / pr;
        document.getElementById('r3').innerText = `精度: ${f(pr)} | FOV: ${f(fv)}mm | 解析度: ${f(rs)}`;
    }

    function c4() {
        let fv = parseFloat(document.getElementById('p4_fov').value);
        let wd = parseFloat(document.getElementById('p4_wd').value);
        let ss = parseFloat(document.getElementById('p4_sensor').value);
        let fl = parseFloat(document.getElementById('p4_f').value);
        // FOV/WD = SS/f  => FOV = (SS * WD) / f
        if(!fv) fv = (ss * wd) / fl;
        if(!ss) ss = (fv * fl) / wd;
        document.getElementById('r4').innerText = `FOV: ${f(fv)}mm | Sensor: ${f(ss)}mm`;
    }

    function c5() {
        let m = parseFloat(document.getElementById('p5_mag').value);
        let fv = parseFloat(document.getElementById('p5_fov').value);
        let pr = parseFloat(document.getElementById('p5_prec').value);
        let ss = parseFloat(document.getElementById('p5_sensor').value);
        let px = parseFloat(document.getElementById('p5_pix').value);
        let rs = parseFloat(document.getElementById('p5_res').value);
        // 邏輯: FOV=SS/m, Prec=px/m, px=SS*1000/res
        if(!fv) fv = ss / m;
        if(!pr) pr = px / m;
        if(!ss) ss = fv * m;
        if(!px) px = pr * m;
        document.getElementById('r5').innerText = `FOV: ${f(fv)}mm | Pix: ${f(px)}um | Sensor: ${f(ss)}mm`;
    }
</script>
</body>
</html>
