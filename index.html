<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程計算工具</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; background: #f0f2f5; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { font-size: 1rem; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #2c3e50; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .res { font-size: 1rem; color: #2c3e50; padding: 15px; background: #f8f9fa; border-radius: 8px; margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>1. 圓形掃描校正</h2>
    <input type="number" id="p1_rate" placeholder="Line Rate (Hz)">
    <input type="number" id="p1_period" placeholder="Line Period (us)">
    <input type="number" id="p1_round" placeholder="真圓度 (係數)">
    <input type="number" id="p1_res" placeholder="影像精度">
    <button onclick="c1()">計算結果</button>
    <div id="r1" class="res">結果將顯示於此</div>

    <h2>2. Sensor Size</h2>
    <input type="number" id="p2_res" placeholder="解析度 (pixels)">
    <input type="number" id="p2_pix" placeholder="Pixel Size (um)">
    <input type="number" id="p2_sensor" placeholder="Sensor Size (mm)">
    <button onclick="c2()">計算結果</button>
    <div id="r2" class="res">結果將顯示於此</div>

    <h2>3. 影像精度</h2>
    <input type="number" id="p3_fov" placeholder="FOV (mm)">
    <input type="number" id="p3_res" placeholder="解析度 (pixels)">
    <input type="number" id="p3_prec" placeholder="影像精度 (mm/pixel)">
    <button onclick="c3()">計算結果</button>
    <div id="r3" class="res">結果將顯示於此</div>

    <h2>4. CCTV FOV 計算</h2>
    <input type="number" id="p4_fov" placeholder="FOV (mm)">
    <input type="number" id="p4_wd" placeholder="工作距離 WD (mm)">
    <input type="number" id="p4_sensor" placeholder="Sensor Size (mm)">
    <input type="number" id="p4_f" placeholder="焦距 f (mm)">
    <button onclick="c4()">計算結果</button>
    <div id="r4" class="res">結果將顯示於此</div>

    <h2>5. Telecentric 計算</h2>
    <input type="number" id="p5_sensor" placeholder="Sensor Size (mm)">
    <input type="number" id="p5_mag" placeholder="倍率">
    <input type="number" id="p5_fov" placeholder="FOV (mm)">
    <input type="number" id="p5_pix" placeholder="Pixel Size (um)">
    <input type="number" id="p5_prec" placeholder="精度 (um/pixel)">
    <input type="number" id="p5_res" placeholder="解析度 (pixels)">
    <button onclick="c5()">計算結果</button>
    <div id="r5" class="res">結果將顯示於此</div>
</div>

<script>
const MAX = 1000000;
const disp = (val) => document.getElementById(val).innerText = (val === 'r1') ? res1 : (val === 'r2') ? res2 : (val === 'r3') ? res3 : (val === 'r4') ? res4 : res5;

function c1() {
    let r = parseFloat(document.getElementById('p1_rate').value);
    let p = parseFloat(document.getElementById('p1_period').value);
    let round = parseFloat(document.getElementById('p1_round').value);
    let res = parseFloat(document.getElementById('p1_res').value);
    if (!p) p = MAX / r;
    let speed = (MAX / (p * round)) * res;
    res1 = (speed * 10).toFixed(3);
    disp('r1');
}

function c2() {
    let res = parseFloat(document.getElementById('p2_res').value);
    let pix = parseFloat(document.getElementById('p2_pix').value);
    let s = parseFloat(document.getElementById('p2_sensor').value);
    if (!s) s = (res * pix) / 1000;
    res2 = s.toFixed(3);
    disp('r2');
}

function c3() {
    let fov = parseFloat(document.getElementById('p3_fov').value);
    let res = parseFloat(document.getElementById('p3_res').value);
    let prec = parseFloat(document.getElementById('p3_prec').value);
    if (!prec) prec = fov / res;
    res3 = prec.toFixed(3);
    disp('r3');
}

function c4() {
    let fov = parseFloat(document.getElementById('p4_fov').value);
    let wd = parseFloat(document.getElementById('p4_wd').value);
    let ss = parseFloat(document.getElementById('p4_sensor').value);
    let fl = parseFloat(document.getElementById('p4_f').value);
    if (!fov) fov = (ss * wd) / fl;
    res4 = fov.toFixed(3);
    disp('r4');
}

function c5() {
    let ss = parseFloat(document.getElementById('p5_sensor').value);
    let m = parseFloat(document.getElementById('p5_mag').value);
    let fov = parseFloat(document.getElementById('p5_fov').value);
    let px = parseFloat(document.getElementById('p5_pix').value);
    let prec = parseFloat(document.getElementById('p5_prec').value);
    let res = parseFloat(document.getElementById('p5_res').value);
    if (!prec) prec = px / m;
    res5 = prec.toFixed(3);
    disp('r5');
}
</script>
</body>
</html>
